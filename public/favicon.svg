<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.15"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="mc">
      <rect x="36" y="8" width="28" height="44" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Premium sheen overlay -->
  <rect width="100" height="50" rx="22" fill="url(#sheen)"/>

  <!-- Microphone capsule (pill shape) -->
  <rect x="36" y="8" width="28" height="44" rx="14" fill="white"/>

  <!-- Equalizer bars inside mic — voice meets finance -->
  <g clip-path="url(#mc)">
    <rect x="40.5" y="28" width="5.5" height="24" rx="2" fill="#16a34a" opacity="0.75"/>
    <rect x="47.5" y="16" width="5.5" height="36" rx="2" fill="#15803d" opacity="0.9"/>
    <rect x="54.5" y="22" width="5.5" height="30" rx="2" fill="#16a34a" opacity="0.75"/>
  </g>

  <!-- Mic stand arc -->
  <path d="M20 52 Q20 76 50 76 Q80 76 80 52" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Mic stand vertical line -->
  <line x1="50" y1="76" x2="50" y2="86" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Mic stand base -->
  <line x1="34" y1="86" x2="66" y2="86" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
